<!DOCTYPE html>
<html lang="ru" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiss Factoring Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    [v-cloak]{display:none}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    .card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:#2563eb;color:#fff} .btn-primary:hover{background:#1d4ed8}
    .btn-secondary{background:#f3f4f6;color:#374151} .btn-secondary:hover{background:#e5e7eb}
    .btn-danger{background:#fef2f2;color:#dc2626} .btn-danger:hover{background:#fee2e2}
    .btn-success{background:#f0fdf4;color:#16a34a} .btn-success:hover{background:#dcfce7}
    .btn-sm{padding:5px 10px;font-size:13px}
    .inp{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;transition:border .15s}
    .inp:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .sel{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;background:#fff;outline:none}
    .sel:focus{border-color:#2563eb}
    .lbl{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
    .th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;color:#6b7280;background:#f9fafb;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
    .td{padding:12px 16px;font-size:14px;color:#374151;border-bottom:1px solid #f3f4f6}
    tr:hover .td{background:#fafafa}
    .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
    .tag-blue{background:#dbeafe;color:#1d4ed8}
    .tag-green{background:#dcfce7;color:#15803d}
    .tag-red{background:#fee2e2;color:#dc2626}
    .tag-amber{background:#fef3c7;color:#b45309}
    .tag-gray{background:#f3f4f6;color:#6b7280}
    .tag-violet{background:#ede9fe;color:#7c3aed}
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;font-size:14px;color:#94a3b8;cursor:pointer;transition:all .15s;text-decoration:none;font-weight:500}
    .sidebar-link:hover{background:rgba(255,255,255,.07);color:#fff}
    .sidebar-link.active{background:#2563eb;color:#fff}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:16px;max-height:90vh;overflow-y:auto;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .metric-card{padding:20px;position:relative;overflow:hidden}
    .metric-val{font-size:24px;font-weight:700;margin-top:4px;color:#111827}
    .metric-lbl{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em}
    tr.overdue-row .td{background:#fef2f2}
    .spinner{width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px}
    .alert-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .alert-warning{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
    .form-grid{display:grid;gap:16px}
    .form-grid-2{grid-template-columns:1fr 1fr}
    .form-grid-3{grid-template-columns:1fr 1fr 1fr}
    @media(max-width:768px){.form-grid-2,.form-grid-3{grid-template-columns:1fr}}
  </style>
</head>
<body class="h-full">
<div id="app" v-cloak></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
