<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiss Factoring — Портал инвестора</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    [v-cloak]{display:none}
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;margin:0}

    /* Sidebar */
    .inv-sidebar{width:260px;min-width:260px;background:linear-gradient(160deg,#0a1628 0%,#0d2444 100%);
      display:flex;flex-direction:column;height:100vh;position:fixed;top:0;left:0;z-index:50;
      overflow-y:auto;transition:transform .25s ease;border-right:1px solid rgba(255,255,255,.05)}
    .inv-nav-link{display:flex;align-items:center;gap:12px;padding:11px 20px;border-radius:10px;
      font-size:14px;color:#94a3b8;cursor:pointer;transition:all .15s;font-weight:500;margin:2px 8px}
    .inv-nav-link:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
    .inv-nav-link.active{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;
      box-shadow:0 4px 15px rgba(37,99,235,.3)}
    .inv-nav-link .icon{width:20px;height:20px;opacity:.7;flex-shrink:0}
    .inv-nav-link.active .icon{opacity:1}

    /* Cards */
    .inv-card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.04);border:1px solid #e2e8f0}
    .inv-metric{padding:24px;position:relative;overflow:hidden}
    .inv-metric::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.06;background:currentColor}

    /* KPI values */
    .kpi-val{font-size:26px;font-weight:800;color:#0f172a;line-height:1.1;margin-top:6px}
    .kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748b}
    .kpi-sub{font-size:12px;color:#94a3b8;margin-top:4px}
    .kpi-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
    .badge-green{background:#dcfce7;color:#15803d}
    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-blue{background:#dbeafe;color:#1d4ed8}
    .badge-amber{background:#fef3c7;color:#b45309}

    /* Table */
    .inv-th{padding:10px 16px;font-size:11px;font-weight:700;color:#64748b;background:#f8fafc;
      text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid #e2e8f0}
    .inv-td{padding:12px 16px;font-size:14px;color:#374151;border-bottom:1px solid #f1f5f9}
    tr:hover .inv-td{background:#f8fafc}

    /* Tags */
    .tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
    .tag-green{background:#dcfce7;color:#15803d}
    .tag-red{background:#fee2e2;color:#dc2626}
    .tag-blue{background:#dbeafe;color:#1d4ed8}
    .tag-amber{background:#fef3c7;color:#b45309}
    .tag-gray{background:#f1f5f9;color:#64748b}
    .tag-violet{background:#ede9fe;color:#7c3aed}

    /* Progress bar */
    .prog-bar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden}
    .prog-fill{height:100%;border-radius:3px;transition:width .4s}

    /* Chart wrapper */
    .chart-wrap{position:relative;padding:0}

    /* Spinner */
    .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#2563eb;
      border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Scrollbar */
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

    /* Mobile */
    .mob-topbar{display:none;position:sticky;top:0;z-index:30;background:#0a1628;
      padding:14px 16px;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .hamburger-inv{background:none;border:none;cursor:pointer;padding:4px;color:#94a3b8;font-size:22px}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40}

    @media(max-width:768px){
      .inv-sidebar{transform:translateX(-100%)}
      .inv-sidebar.is-open{transform:translateX(0)}
      .sidebar-overlay.open{display:block}
      .sidebar-spacer{display:none!important}
      .mob-topbar{display:flex!important}
      main{padding:16px!important}
      .kpi-val{font-size:20px}
      .grid-4{grid-template-columns:1fr 1fr!important}
      .grid-2{grid-template-columns:1fr!important}
    }
  </style>
</head>
<body>
<div id="inv-app" v-cloak></div>
<script type="module" src="/investor/src/main.js"></script>
</body>
</html>
